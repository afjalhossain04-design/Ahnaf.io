<section class="eid-hero">
    <h1 class="eid-message" id="typewriter"></h1>
    <p class="hero-tagline" id="sub-tag" style="opacity:0;">May your joy be as bright as the gold.</p>
    <p id="eid-icons" style="font-size:1.5rem; color:var(--gold); margin-top:15px; opacity:0;">
        <i class="fa-solid fa-moon"></i> <i class="fa-solid fa-star"></i>
    </p>
</section>

<script>
    // ADMIN AUTH (ahnaf09)
    const AUTH = "YWhuYWYwOQ==";

    // --- TERMINAL TYPING ANIMATION ---
    const text = "Eid Mubarak, Ahnaf!";
    const speed = 100; // Speed of typing in ms
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        } else {
            // Once typing finishes, fade in the tagline and icons
            document.getElementById("sub-tag").style.transition = "2s";
            document.getElementById("sub-tag").style.opacity = "1";
            document.getElementById("eid-icons").style.transition = "2s";
            document.getElementById("eid-icons").style.opacity = "1";
        }
    }

    // Start the animation after exactly 1 second (1000ms)
    window.onload = () => {
        setTimeout(typeWriter, 1000);
    };

    // --- ADMIN LOGIC ---
    function login() {
        let p = prompt("Enter Access Key:");
        if(p && btoa(p.trim()) === AUTH) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('site-logo').style.color = '#FFFFFF';
            alert("Identity Verified. Admin Access.");
        } else if(p) { alert("Access Denied."); }
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function toggleDeleteMode() {
        document.getElementById('main-body').classList.toggle('delete-mode-active');
        let btn = document.getElementById('del-btn');
        let active = document.getElementById('main-body').classList.contains('delete-mode-active');
        btn.style.background = active ? "#AA8201" : "#333";
        btn.innerText = active ? "Exit Removal Mode" : "Toggle Removal Mode";
    }

    function extractID(url) {
        let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|\/v\/|embed\/|shorts\/))([^?&"'>]+)/);
        return (match && match[1].length == 11) ? match[1] : null;
    }

    function addVideo() {
        let url = document.getElementById('v-url').value;
        let title = document.getElementById('v-title').value;
        let id = extractID(url);
        if(id && title) {
            let grid = document.getElementById('v-grid');
            let card = document.createElement('div');
            card.className = 'video-card';
            card.id = 'vid-' + Date.now();
            card.innerHTML = `
                <div class="remove-overlay" onclick="removeVideo('${card.id}')"><i class="fa-solid fa-trash-can fa-2x"></i><span>REMOVE</span></div>
                <a href="${url}" target="_blank" style="text-decoration:none; color:white;">
                    <div class="thumb"><img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg"></div>
                    <div style="padding:20px;"><h4 style="font-weight:500;">${title}</h4></div>
                </a>`;
            grid.prepend(card);
            document.getElementById('v-url').value = '';
            document.getElementById('v-title').value = '';
        }
    }

    function removeVideo(id) { if(confirm("Confirm deletion?")) document.getElementById(id).remove(); }

    // --- GOLD-DUST PARTICLE ENGINE ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 180; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                vx: (Math.random() - 0.5) * 0.8,
                vy: (Math.random() - 0.5) * 0.8,
                pulse: Math.random() * 0.05
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            p.size += p.pulse;
            if(p.size > 2.5 || p.size < 0.5) p.pulse *= -1;
            ctx.fillStyle = `rgba(212, 175, 55, ${Math.random()*0.3 + 0.3})`;
            ctx.beginPath(); 
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); 
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init(); animate();
</script>
