<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHNAF | EID MUBARAK | GAMERS EDGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --deep-gold: #AA8201; --emerald: #02231A; --deep-emerald: #01150F; --text: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background: var(--deep-emerald); color: var(--text); overflow-x: hidden; }

        /* THE EID SPECIAL GOLD-DUST BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: linear-gradient(135deg, var(--deep-emerald) 0%, var(--emerald) 100%); 
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
        }

        /* HEADER */
        header { height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(1, 21, 15, 0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--deep-gold); 
        }
        .logo { font-family: 'Cinzel Decorative'; font-weight: 900; color: var(--gold); font-size: 1.5rem; text-shadow: 0 0 20px var(--gold); transition: 0.3s; }

        /* EID HERO AREA */
        .eid-hero { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-top: 90px; }
        
        /* SHIMMERING AHNAF EID ANIMATION */
        .eid-message { font-family: 'Cinzel Decorative'; font-size: clamp(2rem, 10vw, 4.5rem); color: var(--gold); 
            background: linear-gradient(90deg, #D4AF37 0%, #FFFFFF 50%, #D4AF37 100%);
            background-size: 200% auto;
            color: transparent; -webkit-background-clip: text; background-clip: text;
            animation: shine 4s linear infinite; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .hero-tagline { font-family: 'Poppins'; font-size: 0.8rem; letter-spacing: 5px; color: #777; font-weight: 300; }

        /* ADMIN PANEL - GOLD-RIMMED */
        #admin-panel { display: none; position: fixed; top: 110px; right: 20px; width: 330px; background: rgba(2, 35, 26, 0.98); border: 2px solid var(--deep-gold); border-radius: 20px; padding: 30px; z-index: 10000; backdrop-filter: blur(25px); box-shadow: 0 10px 50px rgba(0,0,0,0.9); }
        .admin-header { font-family: 'Cinzel Decorative'; color: var(--gold); text-align: center; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; border-radius: 8px; font-size: 0.8rem; }
        .admin-btn { width: 100%; padding: 12px; background: var(--gold); color: var(--deep-emerald); border: none; font-weight: bold; font-family: 'Cinzel'; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .admin-btn:hover { background: #FFFFFF; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        /* SECTIONS & VIDEOS */
        .container { max-width: 1200px; margin: auto; padding: 60px 20px 40px; }
        .section-title { font-family: 'Cinzel'; font-size: 1.8rem; margin-bottom: 40px; border-left: 8px solid var(--gold); padding-left: 15px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .video-card { position: relative; background: rgba(2, 35, 26, 0.4); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; text-decoration: none; color: white; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow: hidden; backdrop-filter: blur(10px); }
        .video-card:hover { border-color: var(--gold); transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2); }
        
        .thumb { aspect-ratio: 16/9; position: relative; overflow: hidden; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .video-card:hover .thumb img { transform: scale(1.1); filter: brightness(0.8); }

        /* REMOVE OVERLAY (EID EDITION) */
        .remove-overlay { display: none; position: absolute; inset: 0; background: rgba(212, 175, 55, 0.8); align-items: center; justify-content: center; z-index: 10; cursor: pointer; color: var(--deep-emerald); font-family: 'Cinzel Decorative'; font-weight: bold; flex-direction: column; gap: 10px; font-size: 1.2rem; }
        .delete-mode-active .remove-overlay { display: flex; }

        footer { padding: 80px 20px; text-align: center; border-top: 1px solid var(--deep-gold); background: rgba(1, 21, 15, 0.5); }
        .login-trigger { opacity: 0.05; cursor: pointer; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body id="main-body">

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="logo" id="site-logo">AHNAF'S EDGE</div>
    </header>

    <section class="eid-hero">
        <h1 class="eid-message">Eid Mubarak, Ahnaf!</h1>
        <p class="hero-tagline">May your joy be as bright as the gold.</p>
        <p style="font-size:1.5rem; color:var(--gold); margin-top:15px;"><i class="fa-solid fa-moon"></i> <i class="fa-solid fa-star"></i></p>
    </section>

    <div id="admin-panel">
        <div class="admin-header">Command Center</div>
        <input type="text" id="v-url" class="admin-input" placeholder="YouTube Video URL">
        <input type="text" id="v-title" class="admin-input" placeholder="Video Title">
        <button class="admin-btn" onclick="addVideo()"><i class="fa-solid fa-plus"></i> Add Video</button>
        <button class="admin-btn" id="del-btn" onclick="toggleDeleteMode()" style="background:#333; color:white;">Toggle Removal Mode</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:#777; width:100%; cursor:pointer; font-size:0.8rem;">Close</button>
    </div>

    <div class="container">
        <h2 class="section-title">Channel Hub</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 50px;">
            <a href="https://youtube.com/@gameexplorergamerz" target="_blank" style="font-family:'Cinzel Decorative'; text-align:center; padding:25px; background:rgba(2, 35, 26, 0.6); border-radius:15px; text-decoration:none; color:var(--gold); border: 2px solid rgba(212, 175, 55, 0.1); transition: 0.3s; text-shadow: 0 0 10px var(--gold);">Explorer</a>
            <a href="https://youtube.com/@gameverseexplorergamer" target="_blank" style="font-family:'Cinzel Decorative'; text-align:center; padding:25px; background:rgba(2, 35, 26, 0.6); border-radius:15px; text-decoration:none; color:var(--gold); border: 2px solid rgba(212, 175, 55, 0.1); transition: 0.3s; text-shadow: 0 0 10px var(--gold);">Verse</a>
            <a href="https://youtube.com/@runtillcraft" target="_blank" style="font-family:'Cinzel Decorative'; text-align:center; padding:25px; background:rgba(2, 35, 26, 0.6); border-radius:15px; text-decoration:none; color:var(--gold); border: 2px solid rgba(212, 175, 55, 0.1); transition: 0.3s; text-shadow: 0 0 10px var(--gold);">Craft</a>
        </div>

        <h2 class="section-title">Eid Archive</h2>
        <div class="video-grid" id="v-grid">
            <div class="video-card" id="vid-initial">
                <div class="remove-overlay" onclick="removeVideo('vid-initial')">
                    <i class="fa-solid fa-trash-can fa-2x"></i>
                    <span>REMOVE</span>
                </div>
                <a href="https://www.youtube.com/watch?v=ujwrGXKa_IU" target="_blank" style="text-decoration:none; color:white;">
                    <div class="thumb"><img src="https://img.youtube.com/vi/ujwrGXKa_IU/maxresdefault.jpg"></div>
                    <div style="padding:20px;"><h4 style="font-weight:500;">GTA Vice City 4K Story</h4></div>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <h4 style="font-family:'Cinzel'; color:var(--gold); font-size:1rem;">AHNAF | GAMERS EDGE</h4>
        <p style="opacity:0.3; font-size:0.7rem; margin-top:5px;">Professional Gaming Portfolio &copy; 2026</p>
        <div class="login-trigger" onclick="login()">[ ARCHIVE_LOCK ]</div>
    </footer>

    <script>
        // ADMIN AUTH (ahnaf09)
        const AUTH = "YWhuYWYwOQ==";

        function login() {
            let p = prompt("Enter Access Key:");
            if(p && btoa(p.trim()) === AUTH) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('site-logo').style.color = '#FFFFFF';
                alert("Identity Verified. Admin Access Granted.");
            } else if(p) { alert("Access Denied."); }
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function toggleDeleteMode() {
            document.getElementById('main-body').classList.toggle('delete-mode-active');
            let btn = document.getElementById('del-btn');
            let active = document.getElementById('main-body').classList.contains('delete-mode-active');
            btn.style.background = active ? "#AA8201" : "#333";
            btn.innerText = active ? "Exit Removal Mode" : "Toggle Removal Mode";
        }

        function extractID(url) {
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|\/v\/|embed\/|shorts\/))([^?&"'>]+)/);
            return (match && match[1].length == 11) ? match[1] : null;
        }

        function addVideo() {
            let url = document.getElementById('v-url').value;
            let title = document.getElementById('v-title').value;
            let id = extractID(url);
            if(id && title) {
                let grid = document.getElementById('v-grid');
                let card = document.createElement('div');
                card.className = 'video-card';
                card.id = 'vid-' + Date.now();
                card.innerHTML = `
                    <div class="remove-overlay" onclick="removeVideo('${card.id}')"><i class="fa-solid fa-trash-can fa-2x"></i><span>REMOVE</span></div>
                    <a href="${url}" target="_blank" style="text-decoration:none; color:white;">
                        <div class="thumb"><img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg"></div>
                        <div style="padding:20px;"><h4 style="font-weight:500;">${title}</h4></div>
                    </a>`;
                grid.prepend(card);
                document.getElementById('v-url').value = '';
                document.getElementById('v-title').value = '';
            } else { alert("Invalid inputs."); }
        }

        function removeVideo(id) { if(confirm("Confirm deletion?")) document.getElementById(id).remove(); }

        // --- THE ADVANCED EID GOLD-DUST PARTICLE ENGINE ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            // Increased count to 180 for "Gold Dust" dense feel
            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8,
                    pulse: Math.random() * 0.05
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                // Pulsing glow effect for "Sparkles"
                p.size += p.pulse;
                if(p.size > 2.5 || p.size < 0.5) p.pulse *= -1;

                // Dynamic coloring: Deep Gold fading to Pale Gold
                ctx.fillStyle = `rgba(212, 175, 55, ${Math.random()*0.5 + 0.2})`;
                ctx.shadowBlur = Math.random() * 10;
                ctx.shadowColor = 'rgba(212, 175, 55, 0.5)';
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); 
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
