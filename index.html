<section class="eid-hero">
    <h1 class="eid-message"><span id="typewriter"></span><span class="cursor"></span></h1>
    <p id="sub-tag" style="opacity:0; letter-spacing: 3px; font-weight:300; margin-top:10px;">MAY YOUR JOY BE AS BRIGHT AS GOLD</p>
</section>

<script>
    // ADMIN AUTH (ahnaf09)
    const AUTH = "YWhuYWYwOQ==";

    // TERMINAL CMD TYPE ANIMATION (Updated to 2s Delay & Removed 'ahnaf')
    const text = "Eid Mubarak!"; 
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 120); // Slightly slower typing for better effect
        } else {
            // Fade in sub-tag smoothly after typing
            document.getElementById("sub-tag").style.transition = "2s ease-in-out";
            document.getElementById("sub-tag").style.opacity = "1";
        }
    }

    // Start the animation after exactly 2 seconds (2000ms)
    window.onload = () => { 
        setTimeout(typeWriter, 2000); 
    };

    // --- ADMIN LOGIC ---
    function login() {
        let p = prompt("Enter Key:");
        if(p && btoa(p.trim()) === AUTH) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('site-logo').style.color = '#FFFFFF';
            alert("Identity Verified.");
        }
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    
    function toggleDeleteMode() {
        document.getElementById('main-body').classList.toggle('delete-mode-active');
        let active = document.getElementById('main-body').classList.contains('delete-mode-active');
        document.getElementById('del-btn').style.background = active ? "#ff0000" : "#333";
        document.getElementById('del-btn').innerText = active ? "Exit Removal Mode" : "Toggle Removal Mode";
    }

    // --- VIDEO LOGIC ---
    function extractID(url) {
        let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|\/v\/|embed\/|shorts\/))([^?&"'>]+)/);
        return (match && match[1].length == 11) ? match[1] : null;
    }

    function addVideo() {
        let url = document.getElementById('v-url').value;
        let title = document.getElementById('v-title').value;
        let id = extractID(url);
        if(id && title) {
            let div = document.createElement('div');
            div.className = 'video-card';
            div.id = 'v' + Date.now();
            div.innerHTML = `<div class="remove-overlay" onclick="removeVideo('${div.id}')">REMOVE</div>
                <a href="${url}" target="_blank" style="text-decoration:none; color:white;">
                <div class="thumb"><img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg"></div>
                <div style="padding:20px;"><h4>${title}</h4></div></a>`;
            document.getElementById('v-grid').prepend(div);
            document.getElementById('v-url').value = '';
            document.getElementById('v-title').value = '';
        }
    }

    function removeVideo(id) { if(confirm("Permanently delete?")) document.getElementById(id).remove(); }

    // --- GOLD DUST PARTICLES ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.6, 
                vy: (Math.random() - 0.5) * 0.6,
                size: Math.random() * 2 + 0.5
            });
        }
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x<0||p.x>canvas.width) p.vx*=-1;
            if(p.y<0||p.y>canvas.height) p.vy*=-1;
            ctx.fillStyle = "rgba(212, 175, 55, 0.6)";
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', init);
    init(); animate();
</script>
